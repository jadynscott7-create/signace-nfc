<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b83f6">
  <meta name="description" content="Contact Jadyn at Signace">
  <title>Jadyn | Signace</title>
  <style>
    :root {
      --black: #2d2d2d;
      --blue: #0b83f6;
      --white: #ffffff;
      --grey: #f3f5f7;
      --muted: #6f7378;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--black);
      background:
        radial-gradient(circle at 90% 5%, rgba(11,131,246,.16), transparent 30%),
        linear-gradient(180deg, #fff 0%, #f2f5f8 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 430px);
      background: rgba(255,255,255,.97);
      border: 1px solid #e4e8ec;
      border-radius: 28px;
      box-shadow: 0 18px 55px rgba(0,0,0,.10);
      overflow: hidden;
    }
    .topbar {
      height: 9px;
      background: var(--blue);
    }
    .content { padding: 30px 26px 26px; }
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo {
      width: 150px;
      max-height: 125px;
      object-fit: contain;
      display: block;
    }
    .eyebrow {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    h1 {
      margin: 29px 0 3px;
      font-size: 30px;
      letter-spacing: -.8px;
      text-align: center;
    }
    .company {
      margin: 0 0 25px;
      color: var(--muted);
      font-size: 16px;
      text-align: center;
    }
    .primary {
      display: block;
      width: 100%;
      padding: 17px 20px;
      border-radius: 15px;
      background: var(--blue);
      color: var(--white);
      text-align: center;
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .primary:hover { filter: brightness(.94); }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }
    .action {
      min-height: 76px;
      border: 1px solid #dfe4e8;
      border-radius: 15px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      color: var(--black);
      background: var(--grey);
      text-align: center;
      text-decoration: none;
      font-weight: 800;
    }
    .action small {
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }
    .details {
      margin-top: 24px;
      padding-top: 21px;
      border-top: 1px solid #e7e7e7;
      display: grid;
      gap: 13px;
    }
    .detail {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 10px;
      align-items: start;
      font-size: 14px;
    }
    .detail strong {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .detail a {
      color: var(--black);
      text-decoration: none;
      overflow-wrap: anywhere;
    }
    footer {
      padding: 17px 26px 22px;
      text-align: center;
      color: #8a8a8a;
      font-size: 11px;
    }
  </style>
</head>
